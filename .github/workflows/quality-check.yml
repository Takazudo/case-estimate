name: Quality Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format

      - name: Build project
        run: npm run build

      - name: Check for console.log statements
        run: |
          if grep -r "console\.log" src --include="*.js" --include="*.jsx" | grep -v "^//" | grep -v "^\s*//" ; then
            echo "::error::Found console.log statements in source files. Please remove them."
            exit 1
          fi
          echo "No console.log statements found ✓"
