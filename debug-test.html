<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Loading Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin-bottom: 30px; padding: 20px; border: 1px solid #ccc; }
        .svg-container { width: 300px; height: 300px; border: 2px solid #ddd; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>SVG Loading Debug Test</h1>
    
    <div class="test-section">
        <h2>Test 1: Direct SVG Load (Should Work)</h2>
        <div class="svg-container" id="direct-svg"></div>
        <div id="direct-result">Loading...</div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Problematic Path (What the app is trying)</h2>
        <div class="svg-container" id="problem-svg"></div>
        <div id="problem-result">Loading...</div>
    </div>
    
    <div class="test-section">
        <h2>Current case selection in app:</h2>
        <p id="case-info">Loading...</p>
    </div>

    <script>
        // Test 1: Load SVG directly (this should work)
        async function testDirectSVG() {
            try {
                const response = await fetch('/svg/zudo-block-40.svg');
                const svgText = await response.text();
                
                if (response.ok) {
                    document.getElementById('direct-svg').innerHTML = svgText;
                    document.getElementById('direct-result').innerHTML = '<span class="success">✓ SUCCESS: Direct SVG loaded</span>';
                } else {
                    document.getElementById('direct-result').innerHTML = '<span class="error">✗ FAILED: Direct SVG failed</span>';
                }
            } catch (error) {
                document.getElementById('direct-result').innerHTML = '<span class="error">✗ ERROR: ' + error.message + '</span>';
            }
        }

        // Test 2: Try the problematic path (what the app is actually trying to do)
        async function testProblemSVG() {
            const caseType = 'zudo-block-40';
            const problematicPath = `/svg/zudo-block-${caseType}.svg`;
            
            console.log('App is trying to load:', problematicPath);
            
            try {
                const response = await fetch(problematicPath);
                const svgText = await response.text();
                
                if (response.ok) {
                    document.getElementById('problem-svg').innerHTML = svgText;
                    document.getElementById('problem-result').innerHTML = '<span class="success">✓ SUCCESS: Problem path worked</span>';
                } else {
                    document.getElementById('problem-result').innerHTML = '<span class="error">✗ FAILED: Problem path failed (Status: ' + response.status + ')</span>';
                }
            } catch (error) {
                document.getElementById('problem-result').innerHTML = '<span class="error">✗ ERROR: ' + error.message + '</span>';
            }
        }

        // Show case info
        function showCaseInfo() {
            const caseType = 'zudo-block-40';
            const calculatedPath = `/svg/zudo-block-${caseType}.svg`;
            document.getElementById('case-info').innerHTML = 
                `Selected case: <strong>${caseType}</strong><br>` +
                `Calculated SVG path: <strong>${calculatedPath}</strong><br>` +
                `Actual SVG path should be: <strong>/svg/zudo-block-40.svg</strong>`;
        }

        // Run tests
        testDirectSVG();
        testProblemSVG();
        showCaseInfo();
        
        // Add console logs for debugging
        console.log('=== SVG Loading Debug ===');
        console.log('Current case: zudo-block-40');
        console.log('Calculated path: /svg/zudo-block-zudo-block-40.svg');
        console.log('Actual file: /svg/zudo-block-40.svg');
        console.log('Issue: Path calculation is duplicating "zudo-block-"');
    </script>
</body>
</html>
